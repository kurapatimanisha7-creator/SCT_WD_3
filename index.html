<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="quiz-container">

        <h1>Quiz Game</h1>

        <div id="question-box">

            <h2 id="question">Question Here</h2>

            <div id="options"></div>

            <button id="nextBtn">
                Next Question
            </button>

        </div>

        <div id="result-box" class="hide">

            <h2>Your Score</h2>

            <h1 id="score"></h1>

            <button onclick="restartQuiz()">
                Restart Quiz
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
